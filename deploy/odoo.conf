[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; ── Kết nối DB (không bí mật; để exec one-off connect được) ──
; db_password tiêm qua PASSWORD env từ .env — KHÔNG để trong repo.
db_host = db
db_port = 5432
db_user = odoo

; ── Master password cho /web/database/manager. ĐỔI trước khi chạy. ──
admin_passwd = CHANGE_ME_MASTER_PASSWORD

; ── Route đa-DB theo subdomain (sub-domain = tên DB) ──
; touriha.bsdinsights.com → DB "touriha"
; <khach>.touriha.com     → DB "<khach>"  (khi mở SaaS đa-tenant)
dbfilter = ^%d$
list_db = False

; ── Sau Cloudflare Tunnel — tin X-Forwarded-* ──
proxy_mode = True

; ── Workers (VPS RAM chia sẻ với các stack khác) ──
workers = 2
max_cron_threads = 1
limit_memory_soft = 671088640
limit_memory_hard = 805306368
limit_time_cpu = 600
limit_time_real = 1200

log_level = info
