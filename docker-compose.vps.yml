# Touriha — VPS stack. 1 Postgres + 1 Odoo phục vụ NHIỀU DB (route theo subdomain
# qua dbfilter=^%d$), fronted bởi 1 Cloudflare Tunnel. Chạy chung VPS với các app
# khác theo cùng mô hình: mỗi app 1 stack độc lập, KHÔNG mở host port → không đụng port.
#
# Trên VPS:
#   cd /root/touriha
#   cp deploy/.env.example .env && nano .env
#   docker compose -f docker-compose.vps.yml up -d db
#   docker compose -f docker-compose.vps.yml up -d odoo
#   docker compose -f docker-compose.vps.yml --profile tunnel up -d cloudflared
name: touriha

services:
  db:
    image: postgres:16
    container_name: touriha-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    # Pin odoo:19.0 (bản đã verify, khớp compose local). KHÔNG dùng tag rolling `odoo:19`
    # — nightly 06/2026 từng regression vỡ ở base install (nạp cờ ngôn ngữ res.lang).
    image: odoo:19.0
    container_name: touriha-odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ./deploy/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons:ro
      - ./data:/var/lib/odoo
    # Không mở host port — cloudflared (cùng network) reach odoo:8069.
    # Debug one-off: docker compose -f docker-compose.vps.yml exec odoo bash

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: touriha-cloudflared
    restart: unless-stopped
    # Bật bằng `--profile tunnel`. Local-managed (config + credentials) vì tunnel touriha-vps
    # tạo qua cloudflared CLI. Connector join network touriha_default → reach `odoo:8069`
    # (= touriha-odoo). Xem deploy/DEPLOY.md §2.
    # LƯU Ý: tunnel-creds.json phải chmod 644 (cloudflared chạy non-root, không đọc file 0400).
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflare/tunnel-creds.json:/etc/cloudflared/tunnel-creds.json:ro
    depends_on:
      - odoo
