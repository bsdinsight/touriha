# cloudflared tunnel config — demo Touriha.
# Sao chép thành ~/.cloudflared/config.yml (hoặc chạy: cloudflared tunnel run touriha-demo)
#
# Hostname demo: touriha.bsdinsights.com (zone bsdinsights.com — CÓ 's', khác site công ty bsdinsight.com).

tunnel: <TUNNEL_UUID>
credentials-file: /Users/bsd/.cloudflared/<TUNNEL_UUID>.json

ingress:
  - hostname: touriha.bsdinsights.com
    service: http://localhost:8569
  # websocket Odoo (live chat, bus) — cloudflared tự xử lý ws qua cùng hostname
  - service: http_status:404
